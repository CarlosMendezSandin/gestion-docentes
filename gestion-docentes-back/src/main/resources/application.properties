spring.datasource.url=jdbc:mysql://localhost:3306/gestion_docentes?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Puerto del servidor (por defecto 8080)
server.port=8080

# Configuración de la aplicación
app.max-asuntos-dia=3
app.frontend.url=https://gestion-docentes-bay.vercel.app

# Correo (configura con tu cuenta SMTP — Gmail requiere contraseña de aplicación)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Carpeta donde se guardan los materiales subidos
app.upload-dir=uploads/material
